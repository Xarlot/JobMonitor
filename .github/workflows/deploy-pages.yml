name: Deploy to GitHub Pages

# Publishes the built dashboard as a static site to GitHub Pages.
# One-time setup: repo Settings → Pages → Build and deployment → Source: "GitHub Actions".

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need tags to derive the version shown in the UI
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci

      # Show the latest released version on the site (master's package.json may
      # lag the tags). Picks the highest v* tag; no-op if there are none.
      - name: Sync version to latest tag
        shell: bash
        run: |
          TAG=$(git tag --list 'v*' --sort=-version:refname | head -n1)
          if [ -n "$TAG" ]; then npm version --no-git-tag-version --allow-same-version "${TAG#v}"; fi

      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
