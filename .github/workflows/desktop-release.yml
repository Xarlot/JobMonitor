name: Desktop release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write # create the release and upload assets

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - run: npm ci

      - name: Sync version to tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: npm version --no-git-tag-version --allow-same-version "${GITHUB_REF_NAME#v}"

      - run: npm run build # tsc + vite -> dist/
      - run: npm run icons # build/icon.png + electron/tray.png

      - name: Build installers
        run: npx --no-install electron-builder --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.zip
            release/*.AppImage
            release/*.deb
            release/*.yml
            release/*.blockmap
          if-no-files-found: ignore
          retention-days: 5

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish GitHub release (draft)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true # review, then click Publish on GitHub
          fail_on_unmatched_files: true
          files: artifacts/**/*
